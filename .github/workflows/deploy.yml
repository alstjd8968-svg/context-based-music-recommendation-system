name: Deploy to AWS EC2

on:
  push:
    branches:
      - main # main 브랜치에 코드가 푸시되면 자동 배포 실행

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_ACCESS_KEY_PEM }}
          # AWS EC2에 접속하여 최신 코드를 받고 Docker 이미지를 다시 빌드/실행합니다.
          script: |
            cd /home/${{ secrets.AWS_EC2_USERNAME }}/context-based-music-recommendation-system
            git pull origin main
            
            # Docker 컨테이너 재시작 및 빌드
            docker-compose down
            docker-compose up -d --build
